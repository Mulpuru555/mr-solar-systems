<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Employee Dashboard</title>

<link rel="stylesheet" href="employee.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>


<div class="header">

<h2>M.R Solar Systems Employee Portal</h2>

<button id="logoutBtn">Logout</button>

</div>



<div class="dashboard">


<div class="cards">

<div class="card" onclick="openSection('attendanceSection')">
Attendance
</div>

<div class="card" onclick="openSection('erpSection')">
Customer ERP
</div>

</div>



<!-- Attendance -->

<div id="attendanceSection" class="section" style="display:none">

<div class="glass">

<div id="distanceDisplay">Checking location...</div>

<div id="countdownBox">Loading...</div>

<button id="attendanceBtn" onclick="markAttendance()">
Mark Attendance
</button>

<div id="attendanceStatus"></div>

</div>

</div>



<!-- ERP -->

<div id="erpSection" class="section" style="display:none">

<div class="glass">

<form id="paymentForm">

<input id="customerName" placeholder="Customer Name">

<input id="executiveName" placeholder="Executive Name">

<input id="totalAmount" placeholder="Total Amount">

<button type="submit">Add</button>

</form>

<div id="paymentMessage"></div>

</div>


<div class="glass">

<table>

<thead>

<tr>

<th>S.No</th>
<th>Customer</th>
<th>Executive</th>
<th>Total</th>
<th>Paid</th>
<th>Status</th>
<th>Date</th>
<th>Lock</th>
<th>Edit</th>

</tr>

</thead>

<tbody id="recordsTable"></tbody>

</table>

</div>

</div>


</div>



<!-- Edit Popup -->

<div id="editPopup" class="popup">

<div class="popupBox">

<h3>Edit Customer</h3>

<input id="editName">

<input id="editExec">

<input id="editTotal">

<button onclick="saveEdit()">Save</button>

<button onclick="closePopup()">Cancel</button>

</div>

</div>



<script type="module" src="employee.js"></script>
<script type="module" src="attendance.js"></script>

</body>
</html>
