<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Manager Portal</title>

<link rel="stylesheet"
href="manager.css">

</head>

<body>


<div class="nav">

<div class="logo">
Manager Dashboard
</div>

<button
onclick="logoutUser()"
class="logout">

Logout

</button>

</div>



<div class="container">


<!-- ATTENDANCE -->

<div class="card">

<h2>Attendance Report</h2>

<input type="date"
id="attendanceDate">

<table>

<thead>

<tr>

<th>Name</th>
<th>Status</th>
<th>Type</th>
<th>Time</th>
<th>Photo</th>

</tr>

</thead>

<tbody id="attendanceTable">
</tbody>

</table>

</div>



<!-- SUMMARY -->

<div class="card">

<h2>Summary</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Working</th>
<th>Present</th>
<th>Absent</th>

</tr>

</thead>

<tbody id="summaryTable">
</tbody>

</table>

</div>



<!-- BLOCKED -->

<div class="card">

<h2>Blocked</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Branch</th>
<th>Reason</th>
<th>Action</th>

</tr>

</thead>

<tbody id="blockedTable">
</tbody>

</table>

</div>



</div>



<!-- PHOTO POPUP -->

<div id="photoPopup">

<img id="popupImg">

</div>



<script
type="module"
src="manager.js">

</script>

</body>
</html>
