<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manager Portal</title>

<link rel="stylesheet" href="manager.css">

</head>

<body>

<div class="nav">

<div class="logo">
Manager Dashboard
</div>

<button onclick="logoutUser()" class="logout">
Logout
</button>

</div>



<div class="container">


<div class="card">

<h2>Chirala Verification</h2>

<p id="verifyStatus">
Status : loading...
</p>

<button onclick="sendVerify()" class="btn">
Send Verification
</button>

</div>



<div class="card">

<h2>Attendance Report</h2>

<input type="date" id="attendanceDate">

<table>

<thead>
<tr>
<th>Name</th>
<th>Status</th>
<th>Time</th>
</tr>
</thead>

<tbody id="attendanceTable"></tbody>

</table>

</div>



<div class="card">

<h2>Summary</h2>

<table>

<thead>
<tr>
<th>Name</th>
<th>Working</th>
<th>Present</th>
<th>Absent</th>
</tr>
</thead>

<tbody id="summaryTable"></tbody>

</table>

</div>



<div class="card">

<h2>Blocked</h2>

<table>

<thead>
<tr>
<th>Name</th>
<th>Branch</th>
<th>Reason</th>
<th>Action</th>
</tr>
</thead>

<tbody id="blockedTable"></tbody>

</table>

</div>



</div>


<script type="module" src="manager.js"></script>

</body>
</html>
