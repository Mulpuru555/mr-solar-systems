<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Chirala Attendance</title>

<link rel="stylesheet" href="chirala.css">

</head>

<body>


<div class="header">

<h2>M.R SOLAR SYSTEMS</h2>
<p>Chirala Branch Attendance</p>

<button id="logoutBtn" onclick="logoutUser()">
Logout
</button>

</div>



<div class="card">

<p id="empName">Loading...</p>

<p id="gpsStatus">Checking GPS...</p>


<div class="inputBox">

<label>Selfie</label>
<input type="file"
id="selfie"
accept="image/*"
capture="user">

</div>


<div class="inputBox">

<label>Office Photo</label>
<input type="file"
id="office"
accept="image/*"
capture="environment">

</div>


<button
class="btn"
onclick="markAttendance()">

Mark Attendance

</button>


<p id="msg"></p>

</div>



<!-- VERIFY POPUP -->

<div id="verifyPopup" class="popup">

<h3>Verification Required</h3>

<input type="file"
id="verifyPhoto"
accept="image/*"
capture="user">

<button onclick="submitVerify()">

Submit

</button>

</div>



<script
type="module"
src="chirala.js">

</script>


</body>
</html>
