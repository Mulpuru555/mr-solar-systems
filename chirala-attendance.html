<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chirala Attendance</title>

<link rel="stylesheet" href="chirala.css">

</head>

<body>


<!-- NAVBAR -->

<div class="navbar">

<div>
<h2>M.R SOLAR SYSTEMS</h2>
<span>Chirala Branch</span>
</div>

<button onclick="logoutUser()" class="logoutBtn">
Logout
</button>

</div>



<!-- MAIN CARD -->

<div class="card">

<h3 id="empName">Loading...</h3>

<p id="gpsStatus">Checking GPS...</p>


<div class="btnGroup">

<button id="morningBtn" class="btn">
Morning Attendance
</button>

<button id="eveningBtn" class="btn">
Evening Attendance
</button>

</div>

<p id="msg"></p>

</div>



<!-- CAMERA BOX -->

<div id="cameraBox" class="cameraBox">

<video id="video" autoplay></video>

<canvas id="canvas"></canvas>

<div class="camBtns">

<button id="captureBtn" class="btn">
Capture
</button>

<button id="cancelBtn" class="btn cancel">
Cancel
</button>

</div>

</div>



<!-- VERIFY SCREEN -->

<div id="verifyScreen" class="verifyScreen">

<div class="verifyCard">

<div class="loader"></div>

<p id="verifyText">
Checking...
</p>

</div>

</div>



<!-- SUCCESS SCREEN -->

<div id="successScreen" class="successScreen">

<div class="successCard">

<h2>✅ Verified</h2>

<p>Attendance Recorded</p>

</div>

</div>



<script type="module" src="./chirala.js"></script>

</body>
</html>
