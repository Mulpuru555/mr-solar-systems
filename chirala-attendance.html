<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Chirala Employee Portal</title>

<link rel="stylesheet" href="chirala.css">

</head>

<body>

<div class="header">
  <h2>M.R Solar Systems - Chirala</h2>
  <div id="welcomeName"></div>
  <button id="logoutBtn">Logout</button>
</div>

<div class="dashboard">

  <div class="card" onclick="showSection('attendance')">Attendance</div>
  <div class="card" onclick="showSection('history')">History</div>

</div>

<!-- ATTENDANCE -->
<div id="attendance" class="section">

  <button onclick="markAttendance()">Mark Attendance</button>

  <div id="attendanceStatus"></div>

</div>

<!-- HISTORY -->
<div id="history" class="section" style="display:none;">

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="historyTable"></tbody>
  </table>

</div>

<script type="module" src="chirala.js"></script>

<script>
function showSection(sec) {
  document.getElementById("attendance").style.display = "none";
  document.getElementById("history").style.display = "none";

  document.getElementById(sec).style.display = "block";
}
</script>

</body>
</html>
