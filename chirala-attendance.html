<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chirala Attendance</title>

<link rel="stylesheet" href="chirala.css">

</head>

<body>

<div class="header">
<h2>M.R SOLAR SYSTEMS</h2>
<h3>Chirala Branch Attendance</h3>
</div>


<div class="card">

<p id="empName">Employee</p>

<p id="gpsStatus" class="gps">
Checking GPS...
</p>


<div class="photoBox">

<label>Selfie</label>
<input type="file" id="selfie"
accept="image/*"
capture="user">

<label>Office Photo</label>
<input type="file" id="office"
accept="image/*"
capture="environment">

</div>


<button
class="mainBtn"
onclick="markAttendance()">

Mark Attendance

</button>


<p class="status" id="msg"></p>

</div>


<!-- VERIFY POPUP -->

<div id="verifyPopup" class="popup">

<h3>⚠ Verification Required</h3>

<p>Upload live selfie</p>

<input type="file"
id="verifyPhoto"
accept="image/*"
capture="user">

<button onclick="submitVerify()">

Submit

</button>

</div>



<script src="chirala.js"
type="module"></script>

</body>
</html>
